name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: |
            sensor_hub/ui/sensor_hub_ui/package-lock.json
            docs/package-lock.json

      - name: Build React UI
        working-directory: sensor_hub/ui/sensor_hub_ui
        run: |
          npm ci
          npm run build

      - name: Verify generated TS types are up-to-date
        working-directory: sensor_hub/ui/sensor_hub_ui
        run: |
          npm run generate:api
          git diff --exit-code src/gen/

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p sensor_hub/web/dist
          cp -r sensor_hub/ui/sensor_hub_ui/dist/* sensor_hub/web/dist/

      - name: Build Docusaurus docs
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Copy docs build to web/docs
        run: |
          mkdir -p sensor_hub/web/docs
          rm -rf sensor_hub/web/docs/*
          cp -r docs/build/* sensor_hub/web/docs/

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: sensor_hub/go.mod
          cache-dependency-path: sensor_hub/go.sum

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0

      - name: Verify generated Go code is up-to-date
        working-directory: sensor_hub
        run: |
          go generate ./gen/...
          git diff --exit-code gen/

      - name: Run unit tests
        working-directory: sensor_hub
        run: go test ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: |
            sensor_hub/ui/sensor_hub_ui/package-lock.json
            docs/package-lock.json

      - name: Build React UI
        working-directory: sensor_hub/ui/sensor_hub_ui
        run: |
          npm ci
          npm run build

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p sensor_hub/web/dist
          cp -r sensor_hub/ui/sensor_hub_ui/dist/* sensor_hub/web/dist/

      - name: Build Docusaurus docs
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Copy docs build to web/docs
        run: |
          mkdir -p sensor_hub/web/docs
          rm -rf sensor_hub/web/docs/*
          cp -r docs/build/* sensor_hub/web/docs/

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: sensor_hub/go.mod
          cache-dependency-path: sensor_hub/go.sum

      - name: Run integration tests
        working-directory: sensor_hub
        run: go test -tags integration -v -timeout 300s ./integration/
