name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25"
          cache: "npm"
          cache-dependency-path: |
            sensor_hub/ui/sensor_hub_ui/package-lock.json
            docs/package-lock.json

      - name: Build React UI
        working-directory: sensor_hub/ui/sensor_hub_ui
        run: |
          npm ci
          npm run build

      - name: Copy UI dist to web/dist
        run: |
          mkdir -p sensor_hub/web/dist
          cp -r sensor_hub/ui/sensor_hub_ui/dist/* sensor_hub/web/dist/

      - name: Build Docusaurus docs
        working-directory: docs
        run: |
          npm ci
          npm run build

      - name: Copy docs build to web/docs
        run: |
          mkdir -p sensor_hub/web/docs
          rm -rf sensor_hub/web/docs/*
          cp -r docs/build/* sensor_hub/web/docs/

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: sensor_hub/go.mod
          cache-dependency-path: sensor_hub/go.sum

      - name: Run tests
        working-directory: sensor_hub
        run: go test ./...

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.2

      - name: Build temperature-sensor debs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/build-packages.sh sensor --version "$VERSION" --output-dir dist/
          scripts/build-packages.sh sensor-lite --version "$VERSION" --output-dir dist/

      - name: Sign temperature-sensor debs
        run: |
          for deb in dist/temperature-sensor*.deb; do
            gpg --batch --local-user "${{ steps.import_gpg.outputs.fingerprint }}" \
              --output "${deb}.sig" --detach-sign "$deb"
          done

      - name: Upload temperature-sensor debs to release
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/temperature-sensor*.deb dist/temperature-sensor*.deb.sig
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
